name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build NuGet package
        run: ./gradlew :sample-library:packNuget

      - name: Build dotnet tests
        run: dotnet build sample-app/SampleApp.Tests

      - name: Check test output
        if: runner.os == 'Windows'
        run: ls sample-app/SampleApp.Tests/bin/Debug/net10.0/
        shell: bash

      - name: Run dotnet tests
        run: dotnet test sample-app/SampleApp.Tests --no-build
