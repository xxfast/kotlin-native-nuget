# Codecov configuration. Coverage is uploaded from ci.yml under two flags:
#   kotlin: Kover XML from :nuget-processor and the nuget-plugin included build
#   csharp: Coverlet cobertura from the IntegrationTests xunit run
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flag_management:
  individual_flags:
    - name: kotlin
    - name: csharp

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
