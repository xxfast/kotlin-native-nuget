name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Before packNuget, which pays for a Kotlin/Native link. These previously ran only in
      # release.yml, on a tag, so a PR could break them and CI stayed green until release day.
      # koverXmlReport runs the tests and writes the JaCoCo-compatible XML in one pass.
      # nuget-plugin is a composite includeBuild, so its task is addressed with -p nuget-plugin.
      - name: Plugin tests with coverage
        run: |
          ./gradlew :nuget-processor:koverXmlReport
          ./gradlew -p nuget-plugin koverXmlReport

      - name: Build NuGet package
        run: ./gradlew :test-library:packNuget

      - name: Check generated bindings compile as a consumer (net8.0, warnings as errors)
        run: dotnet build GeneratedBindingsCheck

      - name: Build dotnet tests
        run: dotnet build IntegrationTests

      - name: Check test output
        if: runner.os == 'Windows'
        run: ls IntegrationTests/bin/Debug/net10.0/
        shell: bash

      - name: Run dotnet tests with coverage
        run: >
          dotnet test IntegrationTests --no-build
          --collect:"XPlat Code Coverage"
          --results-directory IntegrationTests/TestResults

      # Public repo works tokenless, but the token is wired for correctness and in case the
      # repo ever goes private. Uploads run only on macos-latest: coverage paths are identical
      # across the matrix and one upload per report keeps the Codecov flags unambiguous.
      - name: Upload Kotlin coverage to Codecov
        if: always() && matrix.os == 'macos-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: kotlin
          fail_ci_if_error: false
          files: |
            nuget-processor/build/reports/kover/report.xml
            nuget-plugin/build/reports/kover/report.xml

      - name: Upload C# coverage to Codecov
        if: always() && matrix.os == 'macos-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: csharp
          fail_ci_if_error: false
          files: IntegrationTests/TestResults/**/coverage.cobertura.xml

  # Consumes the plugin the way a real user does: by maven coordinate, from a separate Gradle
  # build. In this repo `NugetPlugin` always finds `:nuget-processor` as a project, so the
  # coordinate fallback it ships to consumers is otherwise never executed.
  smoke-test:
    name: Consume plugin by coordinate
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # Deliberately the lowest JVM a Gradle 9 consumer can be on. This build's own daemon runs on
      # 21 (gradle/gradle-daemon-jvm.properties), so resolving the plugin here on 17 is what proves
      # the published metadata doesn't demand a newer JVM than consumers have. Do not raise this.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish plugin and processor to a local maven repo
        run: >
          ./gradlew
          :nuget-processor:publishAllPublicationsToLocalTestRepository
          :nuget-plugin:publishAllPublicationsToLocalTestRepository

      - name: Resolve the plugin and processor by coordinate
        run: ./gradlew -p smoke-test verifyProcessorResolvesByCoordinate
