name: Release

# Tag with the exact version, no `v` prefix, matching `version` in gradle.properties.
# Both registries are append-only: a published version can never be replaced or deleted.
# Shake the workflow out on a prerelease tag (0.1.0-alpha01) before tagging 0.1.0.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  release:
    name: Publish
    # macOS so the by-coordinate smoke test can run: its fixture declares a macosArm64 target,
    # and that gate must pass before anything reaches a registry.
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      # The tag is the only thing a human types. If it disagrees with the version the artifacts
      # will actually carry, stop here rather than publish a mislabelled release that can't be
      # taken back.
      - name: Verify the tag matches gradle.properties
        run: |
          version="$(grep '^version=' gradle.properties | cut -d= -f2)"
          if [ "$GITHUB_REF_NAME" != "$version" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' does not match gradle.properties version '$version'"
            exit 1
          fi
          echo "Releasing $version"

      - name: Plugin tests
        run: ./gradlew :nuget-plugin:test

      # Publish to a local file repo and resolve the plugin from a separate Gradle build, exactly
      # as a consumer does. This is the last chance to catch a broken coordinate fallback while
      # the mistake is still free.
      - name: Verify the consumer path
        run: |
          ./gradlew \
            :nuget-processor:publishAllPublicationsToLocalTestRepository \
            :nuget-plugin:publishAllPublicationsToLocalTestRepository
          ./gradlew -p smoke-test verifyProcessorResolvesByCoordinate

      # No automaticRelease: both deployments wait for a manual "Publish" at central.sonatype.com.
      # `nuget-plugin` is an included build, so it is a separate Central deployment from
      # `nuget-processor` and needs its own approval.
      - name: Publish to Maven Central
        run: >
          ./gradlew --no-configuration-cache
          :nuget-processor:publishToMavenCentral
          :nuget-plugin:publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_SECRET }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_KEY_PASSWORD }}

      # The Plugin Portal publishes immediately and irreversibly, so it goes last: if Central
      # rejects the credentials or the signature, nothing has been made permanent yet.
      - name: Publish to the Gradle Plugin Portal
        run: ./gradlew --no-configuration-cache :nuget-plugin:publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
